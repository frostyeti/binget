[tools]
zig = "0.15.2"
python = "3.11"
uv = "latest"

[tasks.build]
description = "Build the project into the bin/ folder"
run = """
zig build
mkdir -p bin
cp zig-out/bin/binget bin/
"""

[tasks.pack]
description = "Create all packages via goreleaser (snapshot, no publish)"
run = "goreleaser release --snapshot --skip=publish --clean"
