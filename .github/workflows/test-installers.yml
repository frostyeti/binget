name: Test Installers

on:
  push:
    branches: [ "wip/prototype", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-installers:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout binget
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Build binget
        run: zig build

      - name: Initialize registry
        shell: bash
        run: ./zig-out/bin/binget registry add official https://github.com/frostyeti/binget-pkgs/archive/refs/heads/dev.zip

      - name: Test zed install (user mode)
        shell: bash
        run: ./zig-out/bin/binget install zed --user

      - name: Test kitty install (user mode)
        shell: bash
        if: matrix.os != 'windows-latest'
        run: ./zig-out/bin/binget install kitty --user

      - name: Test alacritty install (user mode)
        shell: bash
        if: matrix.os != 'ubuntu-latest'
        run: ./zig-out/bin/binget install alacritty --user

      - name: Test vscode install (user mode)
        shell: bash
        run: ./zig-out/bin/binget install vscode --user
