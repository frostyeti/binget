name: Test Installers

on:
  push:
    branches: [ "wip/prototype", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-installers:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout binget
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Build binget
        shell: bash
        run: mise run build

      - name: Run E2E local tests
        shell: bash
        if: matrix.os == 'ubuntu-latest'
        run: ./eng/scripts/test_post_install_e2e.sh

      - name: Test node install (runtime mode)
        shell: bash
        run: ./zig-out/bin/binget install node --user

      - name: Test go install (runtime mode)
        shell: bash
        run: ./zig-out/bin/binget install go --user

      - name: Test zed install (user mode)
        shell: bash
        run: ./zig-out/bin/binget install zed --user

      - name: Test kitty install (user mode)
        shell: bash
        if: matrix.os != 'windows-latest'
        run: ./zig-out/bin/binget install kitty --user

      - name: Test alacritty install (user mode)
        shell: bash
        if: matrix.os != 'ubuntu-latest'
        run: ./zig-out/bin/binget install alacritty --user

      - name: Test vscode install (user mode)
        shell: bash
        run: ./zig-out/bin/binget install vscode --user
