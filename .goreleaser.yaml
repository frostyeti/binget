version: 2

project_name: binget

builds:
  - builder: zig
    flags:
      - -Doptimize=ReleaseSafe
    targets:
      - amd64-linux-gnu
      - amd64-windows-gnu
      - aarch64-linux-gnu
      - aarch64-macos-none
      - amd64-macos-none

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}-{{ .Os }}-{{ if eq .Arch "amd64" }}amd64{{ else if eq .Arch "arm64" }}aarch64{{ else }}{{ .Arch }}{{ end }}-v{{ .Version }}
    format_overrides:
      - goos: windows
        formats:
          - zip

nfpms:
  - formats:
      - deb
      - rpm
      - apk
    maintainer: "Binget Authors <email@example.com>"
    description: "Binget package manager"
    bindir: /usr/bin

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
